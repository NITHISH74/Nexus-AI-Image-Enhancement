<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESRGAN AI Enhancer</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="glass-container">
        <div class="header">
            <h1>AI Image Enhancer</h1>
            <p>Upscale and clarify your images in seconds using ESRGAN technology.</p>
        </div>

        <form id="uploadForm">
            <div class="upload-area" id="uploadArea">
                <input type="file" name="file" id="fileInput" accept=".png, .jpg, .jpeg, .webp">
                <div class="upload-text">
                    <svg width="48" height="48" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>
                    </svg>
                    <span id="fileName">Drag and drop an image, or click to browse</span>
                </div>
            </div>
            
            <button type="submit" class="enhance-btn" id="submitBtn">Enhance Resolution</button>
            <div class="error-msg" id="errorMsg"></div>
        </form>

        <div class="spinner" id="spinner"></div>

        <div class="slider-container" id="sliderContainer">
            <div class="labels">
                <span class="label">Original</span>
                <span class="label">AI Enhanced</span>
            </div>
            <img class="slider-img after" id="afterImg" src="" alt="Enhanced">
            <img class="slider-img before" id="beforeImg" src="" alt="Original">
            <div class="slider-line" id="sliderLine"></div>
        </div>

        <div class="action-panel" id="actionPanel" style="display: none;">
            <a href="#" id="downloadBtn" download="AI_Enhanced_Image.jpg" class="download-btn">
                <svg fill="currentColor" viewBox="0 0 20 20" width="20" height="20"><path d="M13 8V2H7v6H2l8 8 8-8h-5zM0 18h20v2H0v-2z"/></svg> 
                Download HD Image
            </a>
            <button id="resetBtn" class="reset-btn">
                <svg fill="currentColor" viewBox="0 0 20 20" width="20" height="20"><path fill-rule="evenodd" d="M4 2a1 1 0 011 1v2.101a7.002 7.002 0 0111.601 2.566 1 1 0 11-1.885.666A5.002 5.002 0 005.999 7H9a1 1 0 010 2H4a1 1 0 01-1-1V3a1 1 0 011-1zm.008 9.057a1 1 0 011.276.61A5.002 5.002 0 0014.001 13H11a1 1 0 110-2h5a1 1 0 011 1v5a1 1 0 11-2 0v-2.101a7.002 7.002 0 01-11.601-2.566 1 1 0 01.61-1.276z" clip-rule="evenodd"/></svg>
                Enhance Another
            </button>
        </div>
    </div>

    <script>
        const form = document.getElementById('uploadForm');
        const fileInput = document.getElementById('fileInput');
        const uploadArea = document.getElementById('uploadArea');
        const fileName = document.getElementById('fileName');
        const submitBtn = document.getElementById('submitBtn');
        const spinner = document.getElementById('spinner');
        const errorMsg = document.getElementById('errorMsg');
        
        const sliderContainer = document.getElementById('sliderContainer');
        const beforeImg = document.getElementById('beforeImg');
        const afterImg = document.getElementById('afterImg');
        const sliderLine = document.getElementById('sliderLine');

        const actionPanel = document.getElementById('actionPanel');
        const downloadBtn = document.getElementById('downloadBtn');
        const resetBtn = document.getElementById('resetBtn');

        let originalImageURL = null;

        // Drag and Drop aesthetics
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            uploadArea.addEventListener(eventName, preventDefaults, false);
        });

        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }

        ['dragenter', 'dragover'].forEach(eventName => {
            uploadArea.addEventListener(eventName, () => uploadArea.classList.add('dragover'), false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            uploadArea.addEventListener(eventName, () => uploadArea.classList.remove('dragover'), false);
        });

        uploadArea.addEventListener('drop', (e) => {
            let dt = e.dataTransfer;
            let files = dt.files;
            fileInput.files = files;
            handleFileSelect(files[0]);
        });

        fileInput.addEventListener('change', function(e) {
            handleFileSelect(this.files[0]);
        });

        function handleFileSelect(file) {
            if (file) {
                fileName.textContent = file.name;
                submitBtn.classList.add('active');
                
                if(originalImageURL) URL.revokeObjectURL(originalImageURL);
                originalImageURL = URL.createObjectURL(file);
                beforeImg.src = originalImageURL;
            }
        }

        // Form Submit via Fetch
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const file = fileInput.files[0];
            if (!file) return;

            errorMsg.style.display = 'none';
            sliderContainer.style.display = 'none';
            actionPanel.style.display = 'none';
            spinner.style.display = 'block';
            
            // Hide the form smoothly
            form.style.display = 'none';

            const formData = new FormData();
            formData.append('file', file);

            try {
                const response = await fetch('/enhance', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    const errObj = await response.json();
                    throw new Error(errObj.error || `Server Error: ${response.status}`);
                }

                const blob = await response.blob();
                const enhancedUrl = URL.createObjectURL(blob);
                
                afterImg.src = enhancedUrl;
                downloadBtn.href = enhancedUrl;
                
                // Show Result and Actions
                sliderContainer.style.display = 'block';
                actionPanel.style.display = 'flex';
                
            } catch (err) {
                errorMsg.textContent = err.message;
                errorMsg.style.display = 'block';
                form.style.display = 'block';
            } finally {
                spinner.style.display = 'none';
                sliderLine.style.left = '50%';
                beforeImg.style.clipPath = 'inset(0 50% 0 0)';
            }
        });

        // Reset App logic
        resetBtn.addEventListener('click', () => {
            sliderContainer.style.display = 'none';
            actionPanel.style.display = 'none';
            form.style.display = 'block';
            fileInput.value = '';
            fileName.textContent = 'Drag and drop an image, or click to browse';
            submitBtn.classList.remove('active');
        });

        // Interactive Slider Logic
        let isSliding = false;

        const startSlide = (e) => {
            isSliding = true;
            e.preventDefault();
        };

        const endSlide = () => { isSliding = false; };

        const moveSlide = (e) => {
            if (!isSliding) return;
            let containerRect = sliderContainer.getBoundingClientRect();
            let xPos = (e.clientX || e.touches[0].clientX) - containerRect.left;
            
            if (xPos < 0) xPos = 0;
            if (xPos > containerRect.width) xPos = containerRect.width;

            let percentage = (xPos / containerRect.width) * 100;
            sliderLine.style.left = `${percentage}%`;
            beforeImg.style.clipPath = `inset(0 ${100 - percentage}% 0 0)`;
        };

        sliderLine.addEventListener('mousedown', startSlide);
        sliderLine.addEventListener('touchstart', startSlide);
        
        window.addEventListener('mouseup', endSlide);
        window.addEventListener('touchend', endSlide);

        window.addEventListener('mousemove', moveSlide);
        window.addEventListener('touchmove', moveSlide);
    </script>
</body>
</html>
